<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tournament Hub - KCUDA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-indigo-600">KCUDA</a>
                    <span class="ml-3 text-sm bg-indigo-100 text-indigo-700 px-2 py-1 rounded font-medium">Admin</span>
                </div>
                <div class="flex items-center">
                    <a href="members.html" class="px-3 py-2 text-gray-700 hover:text-indigo-600">Members</a>
                    <button id="logoutBtn" class="px-3 py-2 text-gray-700 hover:text-indigo-600">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-8 px-4">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center justify-between mb-6">
                <h1 class="text-3xl font-bold text-indigo-600">Tournament Hub Editor</h1>
                <button id="saveBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition">Save Changes</button>
            </div>

            <div id="statusMessage" class="mb-4 hidden rounded-lg p-3 text-sm font-medium"></div>

            <!-- Hub Settings -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">Hub Settings</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Title</label>
                        <input type="text" id="hubTitle" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea id="hubDescription" rows="3" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                    </div>
                </div>
            </div>

            <!-- Team Contacts -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">Team Contacts</h2>
                <p class="text-sm text-gray-500 mb-4">Contact info shown on the members page per team. Can include names and email addresses.</p>
                <div id="teamContactsContainer" class="space-y-4"></div>
            </div>

            <!-- Hub Links -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold">Hub Links</h2>
                    <button id="addHubLink" class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200 transition">+ Add Link</button>
                </div>
                <div id="hubLinksContainer" class="space-y-3"></div>
            </div>

            <!-- Tournaments -->
            <div class="bg-white rounded-lg shadow p-6 mb-6">
                <h2 class="text-xl font-bold mb-4">Tournaments Section</h2>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description (shown below "Tournaments" heading)</label>
                    <textarea id="tournamentsDescription" rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
            </div>
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-bold">Tournament List</h2>
                <button id="addTournament" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition">+ Add Tournament</button>
            </div>
            <div id="tournamentsContainer" class="space-y-6"></div>
        </div>
    </section>

    <script>
        let hubData = null;

        async function loadData() {
            try {
                const response = await fetch('/tournament-hub');
                if (!response.ok) throw new Error('Failed to load');
                hubData = await response.json();
                renderAll();
            } catch (error) {
                showStatus('Failed to load tournament hub data: ' + error.message, 'error');
            }
        }

        function renderAll() {
            document.getElementById('hubTitle').value = hubData.title || '';
            document.getElementById('hubDescription').value = hubData.description || '';
            document.getElementById('tournamentsDescription').value = hubData.tournamentsDescription || '';
            renderTeamContacts();
            renderHubLinks();
            renderTournaments();
        }

        function renderTeamContacts() {
            const container = document.getElementById('teamContactsContainer');
            const contacts = hubData.teamContacts || {};
            const labels = hubData.teamLabels || {};
            const teams = hubData.teams || [];
            container.innerHTML = '';
            teams.forEach(team => {
                const div = document.createElement('div');
                const textarea = document.createElement('textarea');
                textarea.rows = 3;
                textarea.placeholder = 'e.g. Coach Graham graham@example.com';
                textarea.className = 'w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500';
                textarea.value = contacts[team] || '';
                textarea.addEventListener('change', () => updateTeamContact(team, textarea.value));
                div.innerHTML = `<label class="block text-sm font-medium text-gray-700 mb-1">${escHtml(labels[team] || team)}</label>`;
                div.appendChild(textarea);
                container.appendChild(div);
            });
        }

        function updateTeamContact(team, value) {
            if (!hubData.teamContacts) hubData.teamContacts = {};
            hubData.teamContacts[team] = value;
        }

        function renderHubLinks() {
            const container = document.getElementById('hubLinksContainer');
            container.innerHTML = '';
            (hubData.hubLinks || []).forEach((link, i) => {
                container.appendChild(createLinkRow(link, i, 'hub'));
            });
        }

        function renderTournaments() {
            const container = document.getElementById('tournamentsContainer');
            container.innerHTML = '';
            (hubData.tournaments || []).forEach((t, i) => {
                const card = document.createElement('div');
                card.className = 'bg-white rounded-lg shadow p-6';
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-4">
                        <h3 class="text-lg font-bold text-indigo-700">Tournament ${i + 1}</h3>
                        <button class="text-red-500 hover:text-red-700 text-sm font-medium" onclick="removeTournament(${i})">Remove</button>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
                            <input type="text" value="${escHtml(t.name)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" onchange="updateTournament(${i}, 'name', this.value)">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                            <input type="text" value="${escHtml(t.date)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" onchange="updateTournament(${i}, 'date', this.value)">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Location</label>
                            <input type="text" value="${escHtml(t.location)}" class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500" onchange="updateTournament(${i}, 'location', this.value)">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <textarea rows="2" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" onchange="updateTournament(${i}, 'description', this.value)">${escHtml(t.description)}</textarea>
                    </div>
                    <div class="border-t pt-4">
                        <div class="flex items-center justify-between mb-3">
                            <h4 class="font-semibold text-gray-700">Links/Forms</h4>
                            <button class="text-sm bg-indigo-100 text-indigo-700 px-3 py-1 rounded hover:bg-indigo-200 transition" onclick="addTournamentLink(${i})">+ Add Link</button>
                        </div>
                        <div id="tournament-links-${i}" class="space-y-3"></div>
                    </div>
                `;
                container.appendChild(card);

                const linksContainer = document.getElementById(`tournament-links-${i}`);
                (t.links || []).forEach((link, j) => {
                    linksContainer.appendChild(createLinkRow(link, j, 'tournament', i));
                });
            });
        }

        let dragState = null;

        function createLinkRow(link, index, type, tournamentIndex) {
            const row = document.createElement('div');
            row.className = 'flex gap-2 items-center';
            row.draggable = true;
            row.dataset.index = index;
            row.dataset.type = type;
            if (tournamentIndex != null) row.dataset.tournament = tournamentIndex;

            row.addEventListener('dragstart', function(e) {
                e.dataTransfer.effectAllowed = 'move';
                row.classList.add('opacity-50');
                dragState = { type, tournamentIndex, index };
            });
            row.addEventListener('dragend', function() {
                row.classList.remove('opacity-50');
                dragState = null;
            });
            row.addEventListener('dragover', function(e) {
                if (!dragState || dragState.type !== type || dragState.tournamentIndex !== tournamentIndex) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                row.classList.add('border-t-2', 'border-indigo-400');
            });
            row.addEventListener('dragleave', function() {
                row.classList.remove('border-t-2', 'border-indigo-400');
            });
            row.addEventListener('drop', function(e) {
                e.preventDefault();
                row.classList.remove('border-t-2', 'border-indigo-400');
                if (!dragState || dragState.type !== type || dragState.tournamentIndex !== tournamentIndex) return;
                const from = dragState.index;
                const to = index;
                if (from === to) return;
                const links = type === 'hub' ? hubData.hubLinks : hubData.tournaments[tournamentIndex].links;
                const [moved] = links.splice(from, 1);
                links.splice(to, 0, moved);
                if (type === 'hub') renderHubLinks();
                else renderTournaments();
            });

            const labels = hubData.teamLabels || {};
            const teams = hubData.teams || [];
            const allSelected = (!link.team || link.team === 'all') ? ' selected' : '';
            let teamOptions = `<option value="all"${allSelected}>All Teams</option>`;
            teams.forEach(t => {
                const selected = link.team === t ? ' selected' : '';
                teamOptions += `<option value="${t}"${selected}>${escHtml(labels[t] || t)}</option>`;
            });
            row.innerHTML = `
                <span class="cursor-grab text-gray-400 hover:text-gray-600 px-1" title="Drag to reorder">&#x2630;</span>
                <input type="text" value="${escHtml(link.label)}" placeholder="Label" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" onchange="updateLink('${type}', ${tournamentIndex ?? 'null'}, ${index}, 'label', this.value)">
                <input type="text" value="${escHtml(link.url)}" placeholder="URL" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" onchange="updateLink('${type}', ${tournamentIndex ?? 'null'}, ${index}, 'url', this.value)">
                <select class="px-3 py-2 border border-gray-300 rounded-lg text-sm focus:ring-2 focus:ring-indigo-500" onchange="updateLink('${type}', ${tournamentIndex ?? 'null'}, ${index}, 'team', this.value)">${teamOptions}</select>
                <button class="text-red-500 hover:text-red-700 text-sm px-2" onclick="removeLink('${type}', ${tournamentIndex ?? 'null'}, ${index})">&#x2715;</button>
            `;
            return row;
        }

        const _escDiv = document.createElement('div');
        function escHtml(str) {
            _escDiv.textContent = str || '';
            return _escDiv.innerHTML.replace(/"/g, '&quot;');
        }

        function updateLink(type, tournamentIndex, linkIndex, field, value) {
            if (type === 'hub') {
                hubData.hubLinks[linkIndex][field] = value;
            } else {
                hubData.tournaments[tournamentIndex].links[linkIndex][field] = value;
            }
        }

        function removeLink(type, tournamentIndex, linkIndex) {
            if (type === 'hub') {
                hubData.hubLinks.splice(linkIndex, 1);
                renderHubLinks();
            } else {
                hubData.tournaments[tournamentIndex].links.splice(linkIndex, 1);
                renderTournaments();
            }
        }

        function updateTournament(index, field, value) {
            hubData.tournaments[index][field] = value;
        }

        function removeTournament(index) {
            if (confirm('Remove this tournament?')) {
                hubData.tournaments.splice(index, 1);
                renderTournaments();
            }
        }

        function addTournamentLink(tournamentIndex) {
            hubData.tournaments[tournamentIndex].links.push({ label: '', url: '', team: 'all' });
            renderTournaments();
        }

        document.getElementById('addHubLink').addEventListener('click', function() {
            hubData.hubLinks = hubData.hubLinks || [];
            hubData.hubLinks.push({ label: '', url: '', team: 'all' });
            renderHubLinks();
        });

        document.getElementById('addTournament').addEventListener('click', function() {
            hubData.tournaments = hubData.tournaments || [];
            hubData.tournaments.push({
                id: 'tournament-' + Date.now(),
                name: '',
                date: '',
                location: '',
                description: '',
                links: []
            });
            renderTournaments();
        });

        document.getElementById('saveBtn').addEventListener('click', async function() {
            const btn = this;
            btn.disabled = true;
            btn.textContent = 'Saving...';

            // Sync fields from inputs
            hubData.title = document.getElementById('hubTitle').value;
            hubData.description = document.getElementById('hubDescription').value;
            hubData.tournamentsDescription = document.getElementById('tournamentsDescription').value;

            try {
                const response = await fetch('/admin-save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(hubData)
                });

                if (response.ok) {
                    showStatus('Changes saved successfully!', 'success');
                } else {
                    const text = await response.text();
                    showStatus('Failed to save: ' + text, 'error');
                }
            } catch (error) {
                showStatus('Connection error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Save Changes';
            }
        });

        function showStatus(message, type) {
            const el = document.getElementById('statusMessage');
            el.textContent = message;
            el.className = 'mb-4 rounded-lg p-3 text-sm font-medium ' +
                (type === 'success' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800');
            el.classList.remove('hidden');
            if (type === 'success') {
                setTimeout(() => el.classList.add('hidden'), 3000);
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', function() {
            document.cookie = 'kcuda_admin=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'kcuda_auth=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            window.location.href = '/index.html';
        });

        loadData();
    </script>
</body>
</html>
